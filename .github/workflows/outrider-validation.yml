name: Outrider Validation Gate

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to validate'
        required: true
        type: number

jobs:
  validation:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'outrider:convention-done' &&
       github.event.pull_request.user.login == 'remyx-ai[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    env:
      REMYX_API_KEY: ${{ secrets.REMYX_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Mint Remyx bot token
        id: remyx-bot
        shell: bash
        run: |
          token="$(curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.REMYX_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"repo\": \"${{ github.repository }}\"}" \
            "https://engine.remyx.ai/api/v1.0/github/installation-token" \
            | python3 -c "import sys, json; print(json.load(sys.stdin).get('token', ''))")" || token=""
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"
      - uses: remyxai/outrider@salma/remyx-140-refinement-pass-phase-a
        with:
          interest-id: e8a82d88-47e2-4cbb-99a6-bd7446cea409
          mode: validation
          pr-number: ${{ github.event.pull_request.number || inputs.pr_number }}
          github-token: ${{ steps.remyx-bot.outputs.token }}
